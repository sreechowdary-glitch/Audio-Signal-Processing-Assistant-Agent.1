<!-- Granite Explanation Panel — shared by audio and circuit tabs -->
<div class="card granite-panel" id="granite-explanation-panel">
  <div class="card__header">
    <span class="card__title">
      <!-- IBM logo-style icon -->
      <svg class="card__title-icon" viewBox="0 0 16 16" style="fill:var(--ibm-blue-60)">
        <path d="M1 2h14v2H1zm0 3h14v2H1zm0 3h14v2H1zm0 3h14v2H1z"/>
      </svg>
      IBM Granite Explanation
    </span>
    <span class="granite-powered-badge">Powered by IBM Granite</span>
  </div>
  <div class="card__body">
    <div class="granite-unavailable">
      <svg viewBox="0 0 32 32">
        <path d="M16 2a14 14 0 1 0 0 28A14 14 0 0 0 16 2zm0 6a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3zm2 14h-4v-8h4z"/>
      </svg>
      <p style="font-size:var(--fs-sm);font-weight:600;color:var(--gray-70)">Awaiting Analysis</p>
      <p style="font-size:var(--fs-xs);color:var(--gray-60);max-width:360px">
        IBM Granite will explain the engineering findings once an audio analysis
        or circuit diagnostic is complete. All diagnostic calculations are performed
        by the engineering engines — Granite provides explanation only.
      </p>
    </div>
  </div>
</div>
